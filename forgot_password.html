<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            background:#f4f4f4;
        }

        .box{
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.2);
            width:350px;
        }

        input{
            width:100%;
            padding:10px;
            margin:10px 0;
        }

        button{
            width:100%;
            padding:10px;
            cursor:pointer;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Forgot Password</h2>

    <form>
        <input type="email"
               placeholder="Enter your email"
               required>

        <button type="submit">
            Send Reset Link
        </button>
    </form>

    <br>

    <a href="login.html">
        Back to Login
    </a>
</div>

</body>
</html>
